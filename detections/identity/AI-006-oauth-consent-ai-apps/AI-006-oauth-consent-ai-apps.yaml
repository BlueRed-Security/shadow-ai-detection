id: 9b0ae71e-8d13-4e02-95c0-9d09d5d12758
name: AI-006 - OAuth Consent Granted to Unsanctioned AI Applications
description: |
  Detects users granting OAuth consent to third-party AI applications in Entra
  ID: AI notetakers, AI email assistants, browser side-panel agents and
  ChatGPT-style plugins asking for Graph scopes such as Mail.Read, Files.Read.All
  or offline_access. This is shadow AI at the identity layer. No file leaves the
  endpoint, yet the app holds a standing token to read mailboxes, files or
  calendars through the Graph API, with no DLP and no contractual protection.

  This is a different channel from AI-001/AI-004/AI-005. Those see network egress
  or file uploads; a consent is an identity event. Once granted, the app pulls
  data from Microsoft infrastructure, so it never crosses the endpoint or proxy
  again. Consent phishing and benign "AI productivity" apps both surface here.

  Telemetry note: this Sentinel rule reads AuditLogs (Entra ID sign-in and audit
  logs connector). The Defender XDR KQL companion reads CloudAppEvents. Deploy
  whichever matches your connected data.

  Recommended tuning: run the discovery query in the README to inventory AI app
  display names and AppIds in your tenant, then move trusted AppIds into an
  approved list and exclude them.
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - AuditLogs
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
  - Persistence
relevantTechniques:
  - T1528
  - T1098
query: |
  let approved_app_ids = dynamic([
      // "11111111-2222-3333-4444-555555555555"  // example: approved Copilot app
  ]);
  let ai_app_names = dynamic([
      "openai", "chatgpt", "gpt", "anthropic", "claude",
      "perplexity", "gemini", "bard", "mistral", "deepseek",
      "copilot", "notion ai", "grammarly", "otter", "fireflies",
      "fathom", "read.ai", "read ai", "tl;dv", "tldv", "sembly",
      "jasper", "writesonic", "poe", "character.ai", "huggingface",
      "hugging face", "cohere", "you.com", "ai assistant", "ai agent",
      "ai notetaker", "ai note taker", "ai meeting", "ai email",
      "superhuman ai", "krisp", "supernormal", "avoma", "gong"
  ]);
  let sensitive_scopes = dynamic([
      "Mail.Read", "Mail.ReadWrite", "Mail.Send",
      "Files.Read.All", "Files.ReadWrite.All",
      "Sites.Read.All", "Sites.ReadWrite.All",
      "Calendars.Read", "Calendars.ReadWrite",
      "Chat.Read.All", "ChannelMessage.Read.All",
      "User.Read.All", "Directory.Read.All",
      "offline_access", "full_access_as_user"
  ]);
  AuditLogs
  | where OperationName in ("Consent to application", "Add delegated permission grant",
                            "Add app role assignment grant to user", "Add OAuth2PermissionGrant")
  | where Result == "success"
  | extend TargetApp = tostring(TargetResources[0].displayName)
  | extend AppId = tostring(TargetResources[0].id)
  | mv-apply prop = TargetResources[0].modifiedProperties on (
        summarize ScopeBlob = make_list(strcat(tostring(prop.displayName), "=", tostring(prop.newValue)))
    )
  | extend GrantedScopes = tostring(ScopeBlob)
  | extend ConsentType = tostring(parse_json(tostring(InitiatedBy)).user.userPrincipalName)
  | extend User = tostring(coalesce(
        parse_json(tostring(InitiatedBy)).user.userPrincipalName,
        parse_json(tostring(InitiatedBy)).app.displayName))
  | extend UserId = tostring(parse_json(tostring(InitiatedBy)).user.id)
  | where isnotempty(TargetApp)
  | where tolower(TargetApp) has_any (ai_app_names)
  | where AppId !in (approved_app_ids)
  | extend IsAdminConsent = iff(GrantedScopes has "AdminConsent=True" or OperationName has "app role assignment", "Yes", "No")
  | extend TouchesSensitiveScope = iff(GrantedScopes has_any (sensitive_scopes), "Yes", "No")
  | summarize
      ConsentCount = count(),
      FirstSeen = min(TimeGenerated),
      LastSeen = max(TimeGenerated),
      Apps = make_set(TargetApp, 15),
      AppIds = make_set(AppId, 15),
      Operations = make_set(OperationName, 10),
      Scopes = make_set(GrantedScopes, 10),
      AdminConsent = make_set(IsAdminConsent, 3),
      SensitiveScope = make_set(TouchesSensitiveScope, 3)
      by User, UserId
  | extend DistinctAppCount = array_length(Apps)
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: User
      - identifier: AadUserId
        columnName: UserId
alertDetailsOverride:
  alertDisplayNameFormat: 'AI-006: {{User}} granted OAuth consent to AI app(s) {{Apps}}'
  alertDescriptionFormat: 'User {{User}} granted {{ConsentCount}} OAuth consent(s) to unsanctioned AI application(s) {{Apps}} (AppId {{AppIds}}). Sensitive scope involved: {{SensitiveScope}}. Admin consent: {{AdminConsent}}. Review the granted Graph permissions.'
customDetails:
  Apps: Apps
  Scopes: Scopes
  AdminConsent: AdminConsent
  SensitiveScope: SensitiveScope
eventGroupingSettings:
  aggregationKind: AlertPerResult
suppressionDuration: 5h
suppressionEnabled: false
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 5h
    matchingMethod: Selected
    groupByEntities:
      - Account
kind: Scheduled
version: 1.0.0
metadata:
  source:
    kind: Community
  author:
    name: BlueRed Security
  support:
    tier: Community
  categories:
    domains:
      - Security - Threat Protection
